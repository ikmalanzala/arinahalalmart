{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-6">
        <img src="{{ produk.gambar.url }}" class="img-fluid">
    </div>

    <div class="col-md-6">
        <h2 class="fw-bold">{{ produk.nama }}</h2>
        <h4 class="text-success fw-semibold">Rp {{ produk.harga }}</h4>
        <p class="text-muted">{{ produk.deskripsi }}</p>
        <div class="mt-4 d-flex align-items-center gap-2">
            <input  type="number" 
                    id="qty" 
                    value="1" 
                    min="1" 
                    class="from-control"
                    style="width: 90px;">
            <button onclick="kirimWA()" 
                    class="btn btn-success rounded-pill d-flex align-items-center gap-2 px-4 shadow-sm">
                <i class="bi bi-whatsapp"></i>
                    Pesan Via Whatsapp
            </button>
        </div>
    </div>
</div>

</script>

{% endblock %}
